# life-os deployment stack
#
# Service images are built per-service from each Dockerfile (see SPEC.md §8).
# In Phase 1 only `caddy` is meaningful; mcp/scheduler/ingest_* services come
# online as their build phases land. They're listed here as commented-out
# stubs so the compose file matches the eventual deployed shape.

services:
  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

  # ---- Phase 5: MCP HTTP server -------------------------------------------
  mcp:
    image: ghcr.io/santi/life-os-mcp:latest
    build:
      context: .
      dockerfile: mcp_server/Dockerfile
    env_file: .env
    expose: ["8080"]
    restart: unless-stopped

  # ---- Phase 1+: APScheduler --------------------------------------------
  scheduler:
    image: ghcr.io/santi/life-os-scheduler:latest
    build:
      context: .
      dockerfile: scheduler/Dockerfile
    env_file: .env
    restart: unless-stopped

  # ---- Phase 2 ----
  # ingest_whoop:
  #   image: ghcr.io/santi/life-os-ingest-whoop:latest
  #   build:
  #     context: .
  #     dockerfile: ingest_whoop/Dockerfile
  #   env_file: .env
  #   profiles: ["manual"]   # only run via `docker compose run --rm ingest_whoop`

  # ---- Phase 5.5 — Whoop journal (private API) ----
  # Runs unattended via the scheduler container's subprocess. This service
  # exists so the one-time interactive bootstrap works:
  #     docker compose run --rm -it ingest_whoop_journal \
  #         python -m ingest_whoop_journal.whoop_login
  # tty + stdin_open are required for the password / SMS prompts.
  ingest_whoop_journal:
    image: ghcr.io/santi/life-os-ingest-whoop-journal:latest
    build:
      context: .
      dockerfile: ingest_whoop_journal/Dockerfile
    env_file: .env
    profiles: ["manual"]
    tty: true
    stdin_open: true

  # ---- Phase 3 ----
  # ingest_calendar:
  #   image: ghcr.io/santi/life-os-ingest-calendar:latest
  #   build:
  #     context: .
  #     dockerfile: ingest_calendar/Dockerfile
  #   env_file: .env
  #   profiles: ["manual"]

  # ---- Phase 6 ----
  # ingest_cronometer:
  #   image: ghcr.io/santi/life-os-ingest-cronometer:latest
  #   build:
  #     context: .
  #     dockerfile: ingest_cronometer/Dockerfile
  #   env_file: .env
  #   profiles: ["manual"]

  # ---- Phase 7 ----
  # ingest_copilot:
  #   image: ghcr.io/santi/life-os-ingest-copilot:latest
  #   build:
  #     context: .
  #     dockerfile: ingest_copilot/Dockerfile
  #   env_file: .env
  #   profiles: ["manual"]

  # ---- Hevy strength training ----
  # Like the other ingesters, runs unattended via the scheduler container's
  # subprocess. The image is here so a manual one-shot is also available:
  #     docker compose run --rm ingest_hevy ingest --backfill 30
  ingest_hevy:
    image: ghcr.io/santi/life-os-ingest-hevy:latest
    build:
      context: .
      dockerfile: ingest_hevy/Dockerfile
    env_file: .env
    profiles: ["manual"]

  # ---- PushPress (programmed gym workouts) ----
  # Daily window sync of programmed workouts across class types. One-shot:
  #     docker compose run --rm ingest_pushpress ingest
  # Bootstrap auth (one-time, every ~60 days when refresh fails):
  #     docker compose run --rm -it ingest_pushpress login
  ingest_pushpress:
    image: ghcr.io/santi/life-os-ingest-pushpress:latest
    build:
      context: .
      dockerfile: ingest_pushpress/Dockerfile
    env_file: .env
    profiles: ["manual"]
    tty: true
    stdin_open: true

  # ---- Coach (parser + load recommender + Hevy routine writer) ----
  # Cron-driven via the scheduler container; image is here so a manual
  # one-shot is also available:
  #     docker compose run --rm coach run
  #     docker compose run --rm coach sync --dry-run
  coach:
    image: ghcr.io/santi/life-os-coach:latest
    build:
      context: .
      dockerfile: coach/Dockerfile
    env_file: .env
    profiles: ["manual"]

  # ---- Body-image rating sidecar ----
  # MediaPipe + OpenCV is ~600MB of native deps — kept out of mcp_server.
  # Internal only (no host port); mcp reaches it via the compose network
  # at http://face-geometry:8000/analyze. See body_image/RUNBOOK.md.
  face-geometry:
    image: ghcr.io/santi/life-os-face-geometry:latest
    build:
      context: .
      dockerfile: face_geometry/Dockerfile
    restart: unless-stopped
    expose: ["8000"]

  # ---- Phase 4 ----
  # mart_refresh:
  #   image: ghcr.io/santi/life-os-mart-refresh:latest
  #   build:
  #     context: .
  #     dockerfile: mart_refresh/Dockerfile
  #   env_file: .env
  #   profiles: ["manual"]

volumes:
  caddy_data:
  caddy_config:
